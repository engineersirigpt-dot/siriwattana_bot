services:
  backend:
    build:
      context: ./backend
    container_name: siriwattana-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DB_PATH=/app/data/chatbot.db
      - UPLOAD_DIR=/app/data/uploads
      - CORS_ORIGIN=http://localhost:3000
    volumes:
      - ./backend/data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE: http://localhost:8000
    container_name: siriwattana-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped