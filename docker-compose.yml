services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: siriwattana-postgres-test
    restart: unless-stopped
    environment:
      POSTGRES_DB: chatbot_test
      POSTGRES_USER: chatbot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - siriwattana_pg_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatbot -d chatbot_test"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: siriwattana-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - ./backend/.env
    environment:
      - DB_ENGINE=postgres
      - DATABASE_URL=postgresql://chatbot:${POSTGRES_PASSWORD}@postgres:5432/chatbot_test
      - UPLOAD_DIR=/app/data/uploads
      - CORS_ORIGIN=http://${HOST_IP:-localhost}:${FRONTEND_PORT:-3000}
    volumes:
      - ./backend/data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE: http://${HOST_IP:-localhost}:${BACKEND_PORT:-8000}
    container_name: siriwattana-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  siriwattana_pg_test_data:
    name: siriwattana_pg_test_data
